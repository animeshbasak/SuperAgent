<!--
  RECIPE: lower-third-overlay
  Use:    Sliding name-plate / title bar — sits over footage at lower-left.
          Slides in, holds, slides out. Pure overlay; no full-screen content.
  Render: npx hyperframes render --output lower-third.mp4 --format mov
          (use .mov for transparent alpha — drop over footage in any NLE)
  Edit:
    - NAME / TITLE / ACCENT_COLOR.
    - On-screen window: clip data-start / data-duration.
    - Position: bottom/left offsets in CSS.
  Composition is 8 seconds total to support extended on-screen time.
  The lower-third is on-screen seconds 1.0 - 7.0 (6 seconds visible).
-->
<div id="root"
     data-composition-id="root"
     data-start="0"
     data-width="1920"
     data-height="1080"
     style="
       width:1920px;height:1080px;
       background:transparent;
       position:relative; overflow:hidden;
       font-family:'Inter', -apple-system, sans-serif;
     ">

  <!-- Optional: a faint background tint so it's previewable.
       For a transparent render, set this to background:transparent; -->
  <div id="bg-preview" style="
    position:absolute; inset:0;
    background:linear-gradient(135deg,#1a1f3a 0%,#0b1023 100%);
    opacity:0.6;
  "></div>

  <!-- Lower-third clip -->
  <div id="lower-third" class="clip"
       data-start="1" data-duration="6" data-track-index="1"
       style="
         position:absolute;
         left:120px; bottom:140px;
         display:flex; align-items:stretch; gap:0;
         color:#f5f5f5;
       ">

    <!-- accent bar -->
    <div id="lt-accent" style="
      width:8px; background:#7c3aed;
      transform-origin:bottom;
    "></div>

    <!-- text block -->
    <div id="lt-text" style="
      padding:20px 36px 20px 28px;
      background:rgba(10,10,10,0.85);
      backdrop-filter:blur(12px);
      display:flex; flex-direction:column; gap:6px;
      min-width:520px;
    ">
      <div id="lt-name" style="
        font-size:48px; font-weight:700; letter-spacing:-0.02em;
        line-height:1.1;
      ">Sasha Patel</div>
      <div id="lt-title" style="
        font-size:22px; font-weight:400; letter-spacing:0.04em;
        text-transform:uppercase; color:rgba(245,245,245,0.7);
        line-height:1.2;
      ">Head of Engineering · Acme</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    /* Entrance (1.0 - 1.8s):
       - accent bar grows from 0 height
       - text block slides in from left + fades in
       - name + title fade in slightly delayed */
    tl.from("#lt-accent",
      { scaleY: 0, duration: 0.6, ease: "power3.out" }, 1.0);
    tl.from("#lt-text",
      { x: -60, opacity: 0, duration: 0.7, ease: "power3.out" }, 1.1);
    tl.from("#lt-name",
      { opacity: 0, y: 12, duration: 0.5, ease: "power2.out" }, 1.3);
    tl.from("#lt-title",
      { opacity: 0, y: 8, duration: 0.5, ease: "power2.out" }, 1.45);

    /* Hold (1.8 - 6.0s) — no animation */

    /* Exit (6.0 - 7.0s):
       - text slides out, accent collapses */
    tl.to("#lt-text",
      { x: -40, opacity: 0, duration: 0.6, ease: "power2.in" }, 6.0);
    tl.to("#lt-accent",
      { scaleY: 0, duration: 0.5, ease: "power2.in" }, 6.2);

    /* Force composition to 8s total (1s pre-roll + 6s visible + 1s tail) */
    tl.set({}, {}, 8);

    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = tl;
  </script>
</div>
