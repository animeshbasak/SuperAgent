<!--
  RECIPE: data-driven-chart
  Use:    Animated bar chart for a data-viz video. Staggered bar reveal
          + value labels counting up + a 1px reference line.
  Render: npx hyperframes render --output chart.mp4
  Edit:
    - Update the DATA array (label + value).
    - Adjust CHART_TITLE / CHART_SUBTITLE.
    - max_value auto-derived from DATA. Override by hard-coding.
    - Bar colors come from PALETTE — swap to brand.
  Structure:
    0.0 - 1.5   Title fades in
    1.5 - 3.5   Bars enter (staggered)
    1.5 - 4.5   Value labels count up
    4.5 - 6.0   Hold
    6.0 - 7.0   Subtle outro fade
  Total: 7 seconds.
-->
<div id="root"
     data-composition-id="root"
     data-start="0"
     data-width="1920"
     data-height="1080"
     style="
       width:1920px;height:1080px;
       background:#f6f5f1;
       font-family:'Inter', -apple-system, sans-serif;
       color:#0a0a0a;
       position:relative; overflow:hidden;
       padding:120px 160px;
       box-sizing:border-box;
     ">

  <!-- Title block -->
  <div id="chart-header" class="clip"
       data-start="0" data-duration="7" data-track-index="0"
       style="display:flex; flex-direction:column; gap:12px; margin-bottom:80px;">
    <span id="chart-eyebrow" style="
      font-size:18px; letter-spacing:0.3em; text-transform:uppercase;
      color:#6b6b6b; font-weight:500;
    ">Q1 2026 Revenue</span>
    <h1 id="chart-title" style="
      margin:0; font-size:88px; font-weight:700; letter-spacing:-0.03em;
      line-height:1.0;
    ">Growth, by region.</h1>
    <p id="chart-subtitle" style="
      margin:0; font-size:28px; color:#6b6b6b; font-weight:400;
    ">Revenue in millions USD, year-over-year.</p>
  </div>

  <!-- Chart area -->
  <div id="chart-area" class="clip"
       data-start="0" data-duration="7" data-track-index="1"
       style="
         position:relative;
         display:flex; align-items:flex-end; justify-content:space-between;
         gap:40px; height:520px;
       ">
    <!-- bars are rendered by script after DATA is read -->
  </div>

  <!-- Reference line at top of tallest bar -->
  <div id="ref-line" class="clip"
       data-start="0" data-duration="7" data-track-index="2"
       style="
         position:absolute;
         left:160px; right:160px;
         bottom:120px;
         height:1px; background:#0a0a0a; transform-origin:left center;
       "></div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    /* ---------- Data ---------- */
    const DATA = [
      { label: "North America", value: 42.8 },
      { label: "Europe",        value: 31.2 },
      { label: "Asia Pacific",  value: 58.5 },
      { label: "Latin America", value: 18.9 },
      { label: "Middle East",   value: 12.4 },
    ];
    const PALETTE = ["#0a0a0a","#1a7a0a","#2563eb","#7c3aed","#d97706"];
    const max_value = Math.max(...DATA.map(d => d.value));

    /* ---------- Render bars into chart-area ---------- */
    const chart = document.getElementById("chart-area");
    DATA.forEach((d, i) => {
      const heightPx = Math.round((d.value / max_value) * 520);
      const col = document.createElement("div");
      col.className = "bar-column";
      col.style.cssText = "flex:1; display:flex; flex-direction:column; align-items:center; gap:16px; height:100%;";
      col.innerHTML = `
        <div class="bar-value"
             data-target="${d.value}"
             style="font-size:42px; font-weight:600; letter-spacing:-0.01em;">
          0.0
        </div>
        <div class="bar"
             style="
               width:100%;
               height:${heightPx}px;
               background:${PALETTE[i % PALETTE.length]};
               border-radius:6px 6px 0 0;
               transform-origin:bottom center;
             "></div>
        <div class="bar-label" style="
          font-size:22px; color:#6b6b6b; font-weight:500;
          margin-top:8px; text-align:center;
        ">${d.label}</div>
      `;
      // align column to bottom
      col.firstElementChild.style.marginTop = "auto";
      chart.appendChild(col);
    });

    /* ---------- Timeline ---------- */
    const tl = gsap.timeline({ paused: true });

    // Title fades in (0 - 1.5s)
    tl.from("#chart-eyebrow",
      { opacity: 0, y: 16, duration: 0.7, ease: "power3.out" }, 0.0);
    tl.from("#chart-title",
      { opacity: 0, y: 30, duration: 0.9, ease: "power3.out" }, 0.2);
    tl.from("#chart-subtitle",
      { opacity: 0, y: 16, duration: 0.7, ease: "power3.out" }, 0.5);

    // Reference line draws in (1.3 - 2.0s)
    tl.from("#ref-line",
      { scaleX: 0, duration: 0.7, ease: "power3.out" }, 1.3);

    // Bars rise (1.5 - 3.5s, stagger across columns)
    tl.from(".bar",
      { scaleY: 0, duration: 0.9, ease: "power3.out", stagger: 0.08 }, 1.5);
    tl.from(".bar-label",
      { opacity: 0, y: 10, duration: 0.5, ease: "power2.out", stagger: 0.08 }, 1.7);

    // Value labels count up (1.5 - 4.5s)
    document.querySelectorAll(".bar-value").forEach((el, i) => {
      const target = parseFloat(el.dataset.target);
      const counter = { v: 0 };
      tl.to(counter, {
        v: target,
        duration: 1.4,
        ease: "power2.out",
        onUpdate: () => { el.textContent = counter.v.toFixed(1); }
      }, 1.5 + i * 0.08);
    });

    // Hold + tail
    tl.to([".bar","#chart-header","#ref-line",".bar-label",".bar-value"],
      { opacity: 1, duration: 1.5 }, 4.5);     // explicit hold
    tl.set({}, {}, 7);                          // total length 7s

    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = tl;
  </script>
</div>
