<!--
  RECIPE: product-ad-30s
  Use:    30-second product video. Hero shot + 3 feature beats + CTA.
  Render: npx hyperframes render --output ad.mp4
  Edit:
    - Replace the brand name, tagline, three features, and CTA text.
    - Swap the gradient colors (BRAND_A, BRAND_B) to brand palette.
    - Replace the placeholder hero shape with a <video> or <img> if available
      (set data-start, data-duration, data-track-index appropriately).
  Structure:
    0.0 -  4.0   Brand reveal (logo + tagline)
    4.0 - 10.0   Feature 1
   10.0 - 16.0   Feature 2
   16.0 - 22.0   Feature 3
   22.0 - 30.0   CTA (call-to-action)
  Tracks:
    0  static background gradient (no clip — runs full duration)
    1  scene texts (one clip per scene)
    2  CTA overlay
-->
<div id="root"
     data-composition-id="root"
     data-start="0"
     data-width="1920"
     data-height="1080"
     style="
       width:1920px;height:1080px;
       position:relative;overflow:hidden;
       font-family:'Inter', -apple-system, sans-serif;
       background:linear-gradient(135deg,#0b1023 0%,#1a1f3a 100%);
       color:#f5f5f5;
     ">

  <!-- decorative gradient (no class=clip; lives the whole composition) -->
  <div id="bg-glow" style="
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 60%, rgba(124,58,237,0.35), transparent 60%);
    pointer-events:none;
  "></div>

  <!-- ============== SCENE 1 — Brand reveal (0 - 4s) ============== -->
  <div id="scene-brand" class="clip"
       data-start="0" data-duration="4" data-track-index="1"
       style="position:absolute; inset:0; display:flex; flex-direction:column;
              align-items:center; justify-content:center; gap:24px;">
    <div id="brand-logo" style="
      width:140px; height:140px; border-radius:32px;
      background:linear-gradient(135deg,#7c3aed,#3b82f6);
      box-shadow:0 30px 80px rgba(124,58,237,0.4);
    "></div>
    <h1 id="brand-name" style="
      margin:0; font-size:96px; font-weight:700; letter-spacing:-0.03em;
    ">Acme</h1>
    <p id="brand-tag" style="
      margin:0; font-size:32px; font-weight:400; letter-spacing:0.02em;
      color:rgba(245,245,245,0.7);
    ">Make beautiful things, faster.</p>
  </div>

  <!-- ============== SCENE 2 — Feature 1 (4 - 10s) ============== -->
  <div id="scene-f1" class="clip"
       data-start="scene-brand" data-duration="6" data-track-index="1"
       style="position:absolute; inset:0; display:flex; flex-direction:column;
              align-items:center; justify-content:center; padding:0 200px;
              text-align:center;">
    <span class="scene-eyebrow" style="
      font-size:22px; letter-spacing:0.3em; text-transform:uppercase;
      color:#a78bfa; margin-bottom:24px; font-weight:500;
    ">01 — Speed</span>
    <h2 class="scene-headline" style="
      margin:0; font-size:128px; font-weight:700; letter-spacing:-0.03em;
      line-height:1.0;
    ">10× faster<br>than before.</h2>
  </div>

  <!-- ============== SCENE 3 — Feature 2 (10 - 16s) ============== -->
  <div id="scene-f2" class="clip"
       data-start="scene-f1" data-duration="6" data-track-index="1"
       style="position:absolute; inset:0; display:flex; flex-direction:column;
              align-items:center; justify-content:center; padding:0 200px;
              text-align:center;">
    <span class="scene-eyebrow" style="
      font-size:22px; letter-spacing:0.3em; text-transform:uppercase;
      color:#a78bfa; margin-bottom:24px; font-weight:500;
    ">02 — Simple</span>
    <h2 class="scene-headline" style="
      margin:0; font-size:128px; font-weight:700; letter-spacing:-0.03em;
      line-height:1.0;
    ">One file.<br>Zero config.</h2>
  </div>

  <!-- ============== SCENE 4 — Feature 3 (16 - 22s) ============== -->
  <div id="scene-f3" class="clip"
       data-start="scene-f2" data-duration="6" data-track-index="1"
       style="position:absolute; inset:0; display:flex; flex-direction:column;
              align-items:center; justify-content:center; padding:0 200px;
              text-align:center;">
    <span class="scene-eyebrow" style="
      font-size:22px; letter-spacing:0.3em; text-transform:uppercase;
      color:#a78bfa; margin-bottom:24px; font-weight:500;
    ">03 — Reliable</span>
    <h2 class="scene-headline" style="
      margin:0; font-size:128px; font-weight:700; letter-spacing:-0.03em;
      line-height:1.0;
    ">Same input.<br>Same output.</h2>
  </div>

  <!-- ============== SCENE 5 — CTA (22 - 30s) ============== -->
  <div id="scene-cta" class="clip"
       data-start="scene-f3" data-duration="8" data-track-index="1"
       style="position:absolute; inset:0; display:flex; flex-direction:column;
              align-items:center; justify-content:center; gap:32px;">
    <h2 id="cta-headline" style="
      margin:0; font-size:96px; font-weight:700; letter-spacing:-0.02em;
      text-align:center;
    ">Try Acme today</h2>
    <div id="cta-button" style="
      padding:24px 56px; border-radius:999px;
      background:#f5f5f5; color:#0b1023;
      font-size:32px; font-weight:600; letter-spacing:-0.01em;
    ">acme.com / start →</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    /* ---- Scene 1: brand reveal (0 - 4s) ---- */
    tl.from("#brand-logo",
      { opacity: 0, scale: 0.6, duration: 0.9, ease: "power3.out" }, 0);
    tl.from("#brand-name",
      { opacity: 0, y: 40, duration: 0.8, ease: "power3.out" }, 0.4);
    tl.from("#brand-tag",
      { opacity: 0, y: 20, duration: 0.8, ease: "power3.out" }, 0.7);
    tl.to("#scene-brand",
      { opacity: 0, duration: 0.5, ease: "power2.in" }, 3.5);

    /* ---- Scene 2: feature 1 (4 - 10s) ---- */
    tl.from("#scene-f1 .scene-eyebrow",
      { opacity: 0, y: 20, duration: 0.7, ease: "power3.out" }, 4.0);
    tl.from("#scene-f1 .scene-headline",
      { opacity: 0, y: 60, duration: 0.9, ease: "power3.out" }, 4.3);
    tl.to("#scene-f1",
      { opacity: 0, duration: 0.5, ease: "power2.in" }, 9.5);

    /* ---- Scene 3: feature 2 (10 - 16s) ---- */
    tl.from("#scene-f2 .scene-eyebrow",
      { opacity: 0, y: 20, duration: 0.7, ease: "power3.out" }, 10.0);
    tl.from("#scene-f2 .scene-headline",
      { opacity: 0, y: 60, duration: 0.9, ease: "power3.out" }, 10.3);
    tl.to("#scene-f2",
      { opacity: 0, duration: 0.5, ease: "power2.in" }, 15.5);

    /* ---- Scene 4: feature 3 (16 - 22s) ---- */
    tl.from("#scene-f3 .scene-eyebrow",
      { opacity: 0, y: 20, duration: 0.7, ease: "power3.out" }, 16.0);
    tl.from("#scene-f3 .scene-headline",
      { opacity: 0, y: 60, duration: 0.9, ease: "power3.out" }, 16.3);
    tl.to("#scene-f3",
      { opacity: 0, duration: 0.5, ease: "power2.in" }, 21.5);

    /* ---- Scene 5: CTA (22 - 30s) ---- */
    tl.from("#cta-headline",
      { opacity: 0, y: 40, duration: 0.9, ease: "power3.out" }, 22.0);
    tl.from("#cta-button",
      { opacity: 0, scale: 0.9, duration: 0.7, ease: "back.out(1.4)" }, 22.6);

    /* ---- Background pulse on brand glow (subtle, runs the whole video) ---- */
    tl.to("#bg-glow",
      { opacity: 0.6, duration: 30, ease: "none" }, 0);

    /* Force timeline to exactly 30s (tail hold) */
    tl.set({}, {}, 30);

    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = tl;
  </script>
</div>
