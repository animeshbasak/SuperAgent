<!--
  RECIPE: hello-world
  Use:    Smallest viable hyperframes composition. Verify the pipeline.
  Render: npx hyperframes render --output hello.mp4 --quality draft
  Edit:   Change the title text, color, dimensions, duration to taste.
  Notes:
    - Composition root: 1920x1080, 5 seconds.
    - One clip on track 0: a centered <h1>.
    - GSAP timeline: fade+slide in (0-1s), hold (1-4s), fade out (4-5s).
    - Timeline duration === composition duration === 5s.
-->
<div id="root"
     data-composition-id="root"
     data-start="0"
     data-width="1920"
     data-height="1080"
     style="width:1920px;height:1080px;background:#0a0a0a;position:relative;overflow:hidden;">

  <h1 id="title" class="clip"
      data-start="0"
      data-duration="5"
      data-track-index="0"
      style="
        position:absolute;
        top:50%; left:50%;
        transform:translate(-50%, -50%);
        margin:0;
        font-family:'Inter', -apple-system, sans-serif;
        font-weight:700;
        font-size:120px;
        letter-spacing:-0.02em;
        color:#f5f5f5;
        text-align:center;
      ">
    Hello, Hyperframes.
  </h1>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script>
    const tl = gsap.timeline({ paused: true });

    // Entrance: fade + rise (0 -> 1s)
    tl.from("#title", {
      opacity: 0,
      y: 60,
      duration: 1,
      ease: "power3.out"
    }, 0);

    // Hold: nothing happens (1 -> 4s)

    // Exit: fade out (4 -> 5s)
    tl.to("#title", {
      opacity: 0,
      y: -30,
      duration: 1,
      ease: "power2.in"
    }, 4);

    window.__timelines = window.__timelines || {};
    window.__timelines["root"] = tl;
  </script>
</div>
