<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="SuperAgent — the routing brain for AI coding tools">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.5" stop-color="#0f1729"/>
      <stop offset="1" stop-color="#1a0b2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften"><feGaussianBlur stdDeviation="0.6"/></filter>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>

  <!-- Ambient orbiting dots (top-left atmosphere) -->
  <g opacity="0.55">
    <circle cx="180" cy="80" r="180" fill="url(#glow)">
      <animate attributeName="r" values="160;200;160" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.35;0.65;0.35" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="290" r="160" fill="url(#glow)" opacity="0.6">
      <animate attributeName="r" values="140;180;140" dur="7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Brain / orbital core -->
  <g transform="translate(180,180)">
    <circle r="44" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.9">
      <animate attributeName="r" values="40;48;40" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle r="64" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.45">
      <animate attributeName="r" values="60;72;60" dur="4.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.55;0.3" dur="4.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="92" fill="none" stroke="#06b6d4" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="86;100;86" dur="5.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="6" fill="#fff">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Orbiting skill dots -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="14s" repeatCount="indefinite"/>
      <circle cx="92" cy="0" r="4" fill="#10b981"/>
      <circle cx="-92" cy="0" r="4" fill="#06b6d4"/>
      <circle cx="0" cy="92" r="4" fill="#7c3aed"/>
      <circle cx="0" cy="-92" r="4" fill="#f59e0b"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
      <circle cx="64" cy="0" r="3" fill="#fff" opacity="0.8"/>
      <circle cx="-64" cy="0" r="3" fill="#fff" opacity="0.8"/>
    </g>
  </g>

  <!-- Title -->
  <g transform="translate(330,150)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" fill="#fff" letter-spacing="-2">
      SuperAgent
      <animate attributeName="opacity" values="0;1" dur="0.8s" fill="freeze"/>
    </text>
    <text x="0" y="44" font-family="ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#a5b4fc" letter-spacing="0.2">
      The routing brain that lives between your AI and your code.
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
    </text>

    <!-- Animated underline -->
    <line x1="0" y1="60" x2="0" y2="60" stroke="url(#accent)" stroke-width="3" stroke-linecap="round">
      <animate attributeName="x2" values="0;420" dur="1.2s" begin="0.3s" fill="freeze"/>
    </line>

    <!-- Stat row -->
    <g transform="translate(0,98)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#cbd5e1">
      <text x="0" y="0">
        <tspan fill="#10b981" font-weight="700">71.5×</tspan> cheaper queries
      </text>
      <text x="220" y="0">
        <tspan fill="#06b6d4" font-weight="700">33</tspan> skills
      </text>
      <text x="340" y="0">
        <tspan fill="#7c3aed" font-weight="700">8</tspan> AI tools
      </text>
      <text x="450" y="0">
        <tspan fill="#f59e0b" font-weight="700">∞</tspan> fallback to local
      </text>
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.7s" fill="freeze"/>
    </g>
  </g>

  <!-- Bottom keyword strip -->
  <g transform="translate(0,326)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#475569" letter-spacing="2">
    <text x="600" text-anchor="middle">
      CLAUDE  ·  CODEX  ·  CURSOR  ·  WINDSURF  ·  COPILOT  ·  GEMINI  ·  CONTINUE  ·  AIDER
    </text>
  </g>
</svg>
