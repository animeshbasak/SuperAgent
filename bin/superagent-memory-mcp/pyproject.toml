[project]
name = "superagent-memory-mcp"
version = "0.3.0"
description = "MCP server providing persistent multi-tier memory for SuperAgent across Claude Code, Cursor, Antigravity, Gemini CLI, and GitHub Copilot."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "SuperAgent contributors" }]
dependencies = [
    "mcp>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]
vector = [
    "qdrant-client>=1.7",
    "httpx>=0.27",
]

[project.scripts]
superagent-memory-mcp = "memory_os.server:main"
superagent-memory = "memory_os.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["memory_os"]

[tool.pytest.ini_options]
testpaths = ["test"]
asyncio_mode = "auto"
